openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: WhatsApp Bot Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Bot connection and status
  - name: messages
    description: Message history
  - name: contacts
    description: Contact management
  - name: config
    description: Bot configuration
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot connection status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/pair:
    post:
      operationId: requestPairingCode
      tags: [bot]
      summary: Request pairing code for a phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairRequestBody"
      responses:
        "200":
          description: Pairing code issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairResponse"

  /bot/logout:
    post:
      operationId: logoutBot
      tags: [bot]
      summary: Disconnect and log out the bot
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List message history
      parameters:
        - name: contactId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: direction
          in: query
          schema:
            type: string
            enum: [inbound, outbound, all]
            default: all
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /messages/stats:
    get:
      operationId: getMessageStats
      tags: [messages]
      summary: Get message statistics
      responses:
        "200":
          description: Message statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageStats"

  /messages/send:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List known contacts
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"

  /config:
    get:
      operationId: getBotConfig
      tags: [config]
      summary: Get bot configuration
      responses:
        "200":
          description: Bot configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"
    patch:
      operationId: updateBotConfig
      tags: [config]
      summary: Update bot configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBotConfigBody"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"

  /config/auto-replies:
    get:
      operationId: listAutoReplies
      tags: [config]
      summary: List auto-reply rules
      responses:
        "200":
          description: Auto-reply rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutoReply"
    post:
      operationId: createAutoReply
      tags: [config]
      summary: Create an auto-reply rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutoReplyBody"
      responses:
        "201":
          description: Created rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoReply"

  /config/auto-replies/{id}:
    patch:
      operationId: updateAutoReply
      tags: [config]
      summary: Update an auto-reply rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAutoReplyBody"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutoReply"
    delete:
      operationId: deleteAutoReply
      tags: [config]
      summary: Delete an auto-reply rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    BotStatus:
      type: object
      properties:
        state:
          type: string
          enum: [disconnected, connecting, awaiting_pairing, connected]
        phoneNumber:
          type: string
          nullable: true
        deviceName:
          type: string
          nullable: true
        platform:
          type: string
          nullable: true
        connectedAt:
          type: string
          format: date-time
          nullable: true
        uptime:
          type: integer
          nullable: true
      required: [state]

    PairRequestBody:
      type: object
      properties:
        phoneNumber:
          type: string
          description: Phone number with country code e.g. 15551234567
      required: [phoneNumber]

    PairResponse:
      type: object
      properties:
        code:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [code, expiresAt]

    Message:
      type: object
      properties:
        id:
          type: string
        remoteJid:
          type: string
        contactName:
          type: string
          nullable: true
        content:
          type: string
        direction:
          type: string
          enum: [inbound, outbound]
        messageType:
          type: string
          enum: [text, image, audio, video, document, sticker, reaction, other]
        status:
          type: string
          enum: [sent, delivered, read, failed]
        isAutoReply:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, remoteJid, content, direction, messageType, status, isAutoReply, createdAt]

    MessageStats:
      type: object
      properties:
        total:
          type: integer
        inbound:
          type: integer
        outbound:
          type: integer
        autoReplies:
          type: integer
        today:
          type: integer
        uniqueContacts:
          type: integer
      required: [total, inbound, outbound, autoReplies, today, uniqueContacts]

    SendMessageBody:
      type: object
      properties:
        to:
          type: string
          description: Phone number with country code (e.g. 15551234567)
        content:
          type: string
      required: [to, content]

    Contact:
      type: object
      properties:
        id:
          type: string
        jid:
          type: string
        name:
          type: string
          nullable: true
        phoneNumber:
          type: string
        messageCount:
          type: integer
        lastMessageAt:
          type: string
          format: date-time
          nullable: true
      required: [id, jid, phoneNumber, messageCount]

    BotConfig:
      type: object
      properties:
        id:
          type: string
        botName:
          type: string
        prefix:
          type: string
        autoReplyEnabled:
          type: boolean
        readReceiptsEnabled:
          type: boolean
        typingIndicatorEnabled:
          type: boolean
        welcomeMessage:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
      required: [id, botName, prefix, autoReplyEnabled, readReceiptsEnabled, typingIndicatorEnabled, updatedAt]

    UpdateBotConfigBody:
      type: object
      properties:
        botName:
          type: string
        prefix:
          type: string
        autoReplyEnabled:
          type: boolean
        readReceiptsEnabled:
          type: boolean
        typingIndicatorEnabled:
          type: boolean
        welcomeMessage:
          type: string
          nullable: true

    AutoReply:
      type: object
      properties:
        id:
          type: string
        trigger:
          type: string
        response:
          type: string
        matchType:
          type: string
          enum: [exact, contains, startsWith, regex]
        caseSensitive:
          type: boolean
        enabled:
          type: boolean
        hitCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, trigger, response, matchType, caseSensitive, enabled, hitCount, createdAt]

    CreateAutoReplyBody:
      type: object
      properties:
        trigger:
          type: string
        response:
          type: string
        matchType:
          type: string
          enum: [exact, contains, startsWith, regex]
          default: contains
        caseSensitive:
          type: boolean
          default: false
        enabled:
          type: boolean
          default: true
      required: [trigger, response]

    UpdateAutoReplyBody:
      type: object
      properties:
        trigger:
          type: string
        response:
          type: string
        matchType:
          type: string
          enum: [exact, contains, startsWith, regex]
        caseSensitive:
          type: boolean
        enabled:
          type: boolean
