openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Admin Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Live event feed
  - name: groups
    description: Group management
  - name: messages
    description: Message sending
  - name: status
    description: System status
  - name: users
    description: User management
  - name: admin
    description: Admin controls
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List recent events
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: groupId
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
            enum: [info, warn, error, success]
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"

  /events/stats:
    get:
      operationId: getEventStats
      tags: [events]
      summary: Get event statistics summary
      responses:
        "200":
          description: Event statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventStats"

  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List all groups
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupBody"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{id}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get a group by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
    patch:
      operationId: updateGroup
      tags: [groups]
      summary: Update a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupBody"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List sent messages
      parameters:
        - name: groupId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /status:
    get:
      operationId: getSystemStatus
      tags: [status]
      summary: Get system status overview
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      parameters:
        - name: groupId
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get admin settings
      responses:
        "200":
          description: Admin settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
    patch:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update admin settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [admin]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Event:
      type: object
      properties:
        id:
          type: string
        level:
          type: string
          enum: [info, warn, error, success]
        message:
          type: string
        source:
          type: string
        groupId:
          type: string
          nullable: true
        groupName:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - level
        - message
        - source
        - createdAt

    EventStats:
      type: object
      properties:
        total:
          type: integer
        info:
          type: integer
        warn:
          type: integer
        error:
          type: integer
        success:
          type: integer
        lastHour:
          type: integer
      required:
        - total
        - info
        - warn
        - error
        - success
        - lastHour

    Group:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, maintenance]
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - status
        - memberCount
        - createdAt
        - updatedAt

    CreateGroupBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, inactive, maintenance]
          default: active
      required:
        - name

    UpdateGroupBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [active, inactive, maintenance]

    Message:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        groupId:
          type: string
          nullable: true
        groupName:
          type: string
          nullable: true
        priority:
          type: string
          enum: [low, normal, high, urgent]
        status:
          type: string
          enum: [sent, delivered, failed]
        sentBy:
          type: string
        recipientCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - priority
        - status
        - sentBy
        - recipientCount
        - createdAt

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
        groupId:
          type: string
          nullable: true
        priority:
          type: string
          enum: [low, normal, high, urgent]
          default: normal
      required:
        - content

    SystemStatus:
      type: object
      properties:
        overall:
          type: string
          enum: [operational, degraded, outage]
        services:
          type: array
          items:
            $ref: "#/components/schemas/ServiceStatus"
        uptime:
          type: number
        lastChecked:
          type: string
          format: date-time
      required:
        - overall
        - services
        - uptime
        - lastChecked

    ServiceStatus:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [operational, degraded, outage]
        latency:
          type: number
          nullable: true
        description:
          type: string
          nullable: true
      required:
        - name
        - status

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, moderator, member, viewer]
        status:
          type: string
          enum: [active, suspended, pending]
        groupId:
          type: string
          nullable: true
        groupName:
          type: string
          nullable: true
        lastSeen:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - status
        - createdAt

    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, moderator, member, viewer]
          default: member
        groupId:
          type: string
          nullable: true
      required:
        - name
        - email

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, moderator, member, viewer]
        status:
          type: string
          enum: [active, suspended, pending]
        groupId:
          type: string
          nullable: true

    AdminSettings:
      type: object
      properties:
        id:
          type: string
        systemName:
          type: string
        maintenanceMode:
          type: boolean
        allowRegistration:
          type: boolean
        maxGroupSize:
          type: integer
        defaultRole:
          type: string
          enum: [admin, moderator, member, viewer]
        notificationsEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - systemName
        - maintenanceMode
        - allowRegistration
        - maxGroupSize
        - defaultRole
        - notificationsEnabled
        - updatedAt

    UpdateAdminSettingsBody:
      type: object
      properties:
        systemName:
          type: string
        maintenanceMode:
          type: boolean
        allowRegistration:
          type: boolean
        maxGroupSize:
          type: integer
        defaultRole:
          type: string
          enum: [admin, moderator, member, viewer]
        notificationsEnabled:
          type: boolean

    DashboardSummary:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        totalGroups:
          type: integer
        totalMessages:
          type: integer
        recentEvents:
          type: integer
        errorRate:
          type: number
        systemHealth:
          type: string
          enum: [operational, degraded, outage]
      required:
        - totalUsers
        - activeUsers
        - totalGroups
        - totalMessages
        - recentEvents
        - errorRate
        - systemHealth
